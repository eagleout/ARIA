<!-- =====================================================
  BLOC 11 — SCRIPT ANIMATIONS
  Widget Elementor : HTML
  
  PLACEMENT : Ajoute ce bloc TOUT EN BAS de ta page,
  après tous les autres blocs. C'est le script qui 
  déclenche les animations au scroll.
  
  ALTERNATIVE : Tu peux aussi coller ce script dans
  Elementor > Réglages du site > Code personnalisé > Footer
===================================================== -->

<script>
(function() {
  // Scroll Reveal - anime les éléments quand ils entrent dans le viewport
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('lp-visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.lp-reveal').forEach(function(el) {
    observer.observe(el);
  });

  // Smooth scroll pour les ancres internes
  document.querySelectorAll('a[href^="#lp-"]').forEach(function(anchor) {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      var target = document.querySelector(this.getAttribute('href'));
      if (target) {
        var offset = 80; // hauteur du header Elementor
        var pos = target.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top: pos, behavior: 'smooth' });
      }
    });
  });
})();
</script>
