<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<style>
.epf * { box-sizing: border-box; margin: 0; padding: 0; }
.epf { font-family: 'Quicksand', sans-serif; color: #2A2A2A; line-height: 1.7; font-size: 17px; }
.epf a { text-decoration: none; }

.epf-section {
  background: linear-gradient(135deg, #E8813A 0%, #F5A623 100%);
  padding: 100px 0; position: relative; overflow: hidden;
}
@media (max-width: 768px) { .epf-section { padding: 64px 0; } }
.epf-section::before {
  content: ''; position: absolute; top: -40%; right: -15%;
  width: 500px; height: 500px;
  background: rgba(255,255,255,0.08); border-radius: 50%;
}
.epf-section::after {
  content: ''; position: absolute; bottom: -25%; left: -8%;
  width: 350px; height: 350px;
  background: rgba(255,255,255,0.05); border-radius: 50%;
}

.epf-container { max-width: 800px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
.epf-inner { text-align: center; }

.epf-inner h2 {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(28px, 4vw, 42px); font-weight: 800;
  color: white; margin-bottom: 16px; line-height: 1.2;
}
.epf-inner p {
  font-size: 18px; color: rgba(255,255,255,0.85);
  margin-bottom: 12px; line-height: 1.7;
}

/* Checklist */
.epf-checks {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin: 28px 0 36px;
}
.epf-check {
  display: flex; align-items: center; gap: 8px;
  color: white; font-size: 15px; font-weight: 600;
}
.epf-check-icon {
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.epf-btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 18px;
  border: none; cursor: pointer; border-radius: 60px; padding: 20px 44px;
  background: white; color: #E8813A;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  transition: all 0.35s ease;
}
.epf-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }

.epf-note {
  margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.6);
}
